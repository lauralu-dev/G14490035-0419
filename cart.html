<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物車｜ESG 商品交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">
</head>

<body data-page="cart">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html" id="nav-brand">ESG 商品交易平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" data-nav="home" href="index.html" id="nav-home">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="products" href="products.html" id="nav-products">商品介紹</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="redeem" href="redeem.html" id="nav-redeem">綠點兌換</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" data-nav="cart" href="cart.html" id="nav-cart" aria-current="page">購物車</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="sell" href="sell.html" id="nav-sell">上架</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="profile" href="profile.html" id="nav-profile">個人資料</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="quiz.html">🌿 小綠人測驗</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-lg-center flex-wrap gap-2">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false" data-i18n="nav.language">語言</a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                            <li><a class="dropdown-item" href="#" data-set-lang="zh">中文</a></li>
                            <li><a class="dropdown-item" href="#" data-set-lang="en">English</a></li>
                        </ul>
                    </li>
                    <li class="nav-item py-1 py-lg-0">
                        <button type="button" class="btn btn-sm btn-outline-success text-nowrap" id="nav-auth-btn">登入</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="section-heading" id="page-title">購物車</h1>
        <p class="lead text-muted" id="page-lead"></p>

        <div id="cart-empty" class="alert alert-light border d-none mt-4" role="status"></div>

        <div id="cart-panel" class="mt-4 d-none">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th id="th-product">商品</th>
                            <th id="th-price">單價</th>
                            <th id="th-qty">數量</th>
                            <th id="th-sub">小計</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-tbody"></tbody>
                </table>
            </div>

            <div class="row g-3 mt-2">
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <p class="small text-muted mb-1" id="lbl-avail-credit"></p>
                            <p class="h5 mb-3" id="val-avail-credit">NT$ 0</p>
                            <label class="form-label" id="lbl-use-credit" for="input-use-credit"></label>
                            <input type="number" class="form-control" id="input-use-credit" min="0" step="1" value="0">
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <p class="small text-muted mb-1" id="lbl-avail-points"></p>
                            <p class="h5 mb-3" id="val-avail-points">0</p>
                            <label class="form-label" id="lbl-use-points" for="input-use-points"></label>
                            <input type="number" class="form-control" id="input-use-points" min="0" step="1" value="0">
                            <p class="form-text small mt-1" id="hint-points"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mt-4 p-3 bg-light rounded">
                <p class="mb-0"><span id="lbl-subtotal"></span>：<strong id="cart-subtotal">NT$ 0</strong></p>
                <button type="button" class="btn btn-success btn-lg" id="btn-checkout"></button>
            </div>
        </div>
    </main>

    <div id="toast-host" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <footer class="site-footer text-center py-4">
        <div class="container">
            <p class="text-muted small mb-0">&copy; 2026 ESG 商品交易平台</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/greenmart-core.js"></script>
    <script src="js/greenmart-local.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
