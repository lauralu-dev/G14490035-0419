<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上架商品｜ESG 商品交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">
    <style>
        .img-upload-box {
            border: 2px dashed #c8e0b8;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #f7faf4;
        }
        .img-upload-box:hover {
            border-color: #4a8c3f;
            background: #eaf3de;
        }
        .img-upload-box .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .img-upload-box p { font-size: 13px; color: #6a8a64; margin: 0; }
        .img-preview-wrap { position: relative; display: inline-block; }
        .img-preview-wrap img {
            width: 100%; max-height: 220px; object-fit: cover;
            border-radius: 10px; border: 1px solid #c8e0b8;
        }
        .img-remove-btn {
            position: absolute; top: 8px; right: 8px;
            width: 26px; height: 26px; border-radius: 50%;
            background: rgba(0,0,0,0.5); color: #fff; border: none;
            font-size: 14px; line-height: 26px; text-align: center;
            cursor: pointer; padding: 0;
        }
        .img-uploading { font-size: 12px; color: #4a8c3f; margin-top: 6px; }

        #my-listings-section { margin-top: 3rem; }

        .my-listing-card { transition: box-shadow 0.2s; }
        .my-listing-card:hover { box-shadow: 0 4px 18px rgba(74,140,63,0.13) !important; }

        .listing-thumb {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 8px; border: 1px solid #c8e0b8;
            background: #f7faf4; flex-shrink: 0;
        }
        .listing-thumb-placeholder {
            width: 80px; height: 80px; border-radius: 8px;
            border: 1px solid #c8e0b8; background: #f0f5ec;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; flex-shrink: 0;
        }
        .listing-name { max-width: 260px; }

        .listing-badge {
            font-size: 11px; padding: 3px 9px;
            border-radius: 20px; white-space: nowrap;
        }
        .badge-active   { background: #d4edda; color: #276233; }
        .badge-delisted { background: #f8d7da; color: #842029; }

        .listing-esg  { font-size: 11px; color: #6a8a64; }
        .listing-time { font-size: 11px; color: #aaa; }

        #listings-empty { color: #8aaa80; font-size: 14px; }

        .delist-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1055;
            display: flex; align-items: center; justify-content: center;
        }
        .delist-box {
            background: #fff; border-radius: 14px; padding: 2rem;
            max-width: 360px; width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
    </style>
</head>

<body data-page="sell">
    <!-- ── 導覽列 ── -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html" id="nav-brand">ESG 商品交易平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" data-nav="home" href="index.html" id="nav-home">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="products" href="products.html" id="nav-products">商品介紹</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="redeem" href="redeem.html" id="nav-redeem">綠點兌換</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="cart" href="cart.html" id="nav-cart">購物車</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" data-nav="sell" href="sell.html" id="nav-sell" aria-current="page">上架</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="profile" href="profile.html" id="nav-profile">個人資料</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="quiz.html">🌿 小綠人測驗</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-lg-center flex-wrap gap-2">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false" data-i18n="nav.language">語言</a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                            <li><a class="dropdown-item" href="#" data-set-lang="zh">中文</a></li>
                            <li><a class="dropdown-item" href="#" data-set-lang="en">English</a></li>
                        </ul>
                    </li>
                    <li class="nav-item py-1 py-lg-0">
                        <button type="button" class="btn btn-sm btn-outline-success text-nowrap"
                            id="nav-auth-btn">登入</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">

        <!-- ── 上架表單 ── -->
        <h1 class="section-heading" id="page-title">上架商品</h1>
        <p class="lead text-muted" id="page-lead">填寫下列資訊即可送出（本機先存於瀏覽器示意）。成功上架將依標價給予少量綠點回饋；串接資料庫後可正式刊登。</p>

        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body">
                <form id="sell-form" class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="sell-name" id="lbl-sell-name">商品名稱</label>
                        <input type="text" class="form-control" id="sell-name" required maxlength="120"
                            placeholder="例：公平貿易咖啡掛耳包">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="sell-price" id="lbl-sell-price">售價（NT$）</label>
                        <input type="number" class="form-control" id="sell-price" required min="1" step="1"
                            placeholder="199">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="sell-esg" id="lbl-sell-esg">ESG／永續說明</label>
                        <input type="text" class="form-control" id="sell-esg" maxlength="200"
                            placeholder="例：減塑包裝、產銷履歷">
                    </div>

                    <!-- 圖片上傳 -->
                    <div class="col-12">
                        <label class="form-label" id="lbl-sell-imageLabel">商品圖片（選填）</label>
                        <input type="file" id="sell-image-input" accept="image/*" class="d-none">
                        <div id="sell-image-dropzone" class="img-upload-box">
                            <div class="upload-icon">🖼️</div>
                            <p id="lbl-sell-imageHint">點擊上傳圖片，或將圖片拖曳至此</p>
                            <p class="mt-1" style="font-size:11px;color:#aaa;" id="lbl-sell-imageSpec">支援 JPG、PNG、WEBP，最大 5MB</p>
                        </div>
                        <div id="sell-image-preview" class="img-preview-wrap d-none w-100 mt-2">
                            <img id="sell-preview-img" src="" alt="預覽圖">
                            <button type="button" class="img-remove-btn" id="sell-image-remove">✕</button>
                        </div>
                        <p id="sell-image-status" class="img-uploading d-none"></p>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-success" id="sell-submit-btn">送出上架</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 我的上架商品（含下架功能）-->
        <section id="my-listings-section">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="section-heading mb-0" style="font-size:1.25rem;" id="lbl-sell-myListingsHeading">我的上架商品</h2>
                <select class="form-select form-select-sm" id="listing-filter" style="width:auto;">
                    <option value="all" id="lbl-sell-filterAll">全部</option>
                    <option value="active" id="lbl-sell-filterActive">上架中</option>
                    <option value="delisted" id="lbl-sell-filterDelisted">已下架</option>
                </select>
            </div>

            <div id="my-listings-list" class="d-flex flex-column gap-3"></div>

            <div id="listings-empty" class="text-center py-5 d-none">
                <p class="mt-2" id="lbl-sell-emptyListings">目前尚無上架商品</p>
            </div>
        </section>
    </main>

    <!-- ── 下架確認遮罩 ── -->
    <div id="delist-overlay" class="delist-overlay d-none">
        <div class="delist-box">
            <h5 class="mb-1" id="lbl-sell-delistTitle">確認下架</h5>
            <p class="text-muted small mb-3" id="lbl-sell-delist-confirm-name"></p>
            <p class="mb-4" id="lbl-sell-delistBody">下架後商品將從平台隱藏，可透過「已下架」篩選查看或重新上架。確定要下架嗎？</p>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-sm btn-outline-secondary" id="delistCancel">取消</button>
                <button class="btn btn-sm btn-danger" id="lbl-sell-delistConfirm">確認下架</button>
            </div>
        </div>
    </div>

    <div id="toast-host" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <footer class="site-footer text-center py-4">
        <div class="container">
            <p class="text-muted small mb-0">&copy; 2026 ESG 商品交易平台</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/greenmart-core.js"></script>
    <script src="js/greenmart-local.js"></script>
    <script src="js/sell.js"></script>
</body>

</html>
