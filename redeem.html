<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兌換與交易｜綠行選品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light" data-page="redeem">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html" id="nav-brand">綠行選品</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" data-nav="home" href="index.html" id="nav-home">首頁</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="products" href="products.html" id="nav-products">商品介紹</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" data-nav="redeem" href="redeem.html" id="nav-redeem"
                            aria-current="page">兌換商品</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="cart" href="cart.html" id="nav-cart">購物車</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="sell" href="sell.html" id="nav-sell">上架</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-nav="profile" href="profile.html" id="nav-profile">個人資料</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-lg-center flex-wrap gap-2">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false" data-i18n="nav.language">語言</a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="languageDropdown">
                            <li><a class="dropdown-item" href="#" data-set-lang="zh">中文</a></li>
                            <li><a class="dropdown-item" href="#" data-set-lang="en">English</a></li>
                        </ul>
                    </li>
                    <li class="nav-item py-1 py-lg-0">
                        <button type="button" class="btn btn-sm btn-outline-success text-nowrap" id="nav-auth-btn">登入</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="text-center mb-4 section-heading" id="redeem-heading">會員 ID／綠點與交易紀錄</h1>

        <div class="mb-3">
            <label for="idInput" class="form-label">輸入 ID (RFID 掃描支援):</label>
            <input type="text" id="idInput" class="form-control" placeholder="輸入完成請按下提交" />
        </div>

        <div class="mb-3">
            <label for="productCodeInput" class="form-label">輸入商品代號:</label>
            <input type="text" id="productCodeInput" class="form-control" placeholder="按下檢查商品可以檢查並自動輸入產品價格" />
        </div>
        <button id="checkProductButton" class="btn btn-primary flex-grow-1">檢查商品</button>

        <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="productModalLabel">商品確認</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="productInfo">商品名稱: <span id="modalProductName"></span></p>
                        <p>商品金額: <span id="modalProductPrice"></span> 元</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" id="confirmProductButton">確認</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3 mt-4">
            <label for="amountInput" class="form-label">金額:</label>
            <input type="number" id="amountInput" class="form-control" placeholder="輸入金額 (可為正數或負數)" />
        </div>

        <div class="mb-3 d-flex gap-2 flex-wrap">
            <button id="submitButton" class="btn btn-success flex-grow-1">提交</button>
            <button id="checkBalanceButton" class="btn btn-info flex-grow-1">查詢目前餘額</button>
            <button id="viewTransactionsButton" class="btn btn-warning flex-grow-1">查看交易紀錄與圖表</button>
        </div>

        <div id="result" class="alert alert-info d-none"></div>

        <div id="transactionRecords" class="mt-4">
            <h3>今日交易紀錄:</h3>
            <ul class="list-group" id="transactionList"></ul>
        </div>

        <div id="chartContainer" class="mt-4">
            <h3>消費金額變化圖:</h3>
            <canvas id="transactionChart"></canvas>
        </div>
    </main>

    <div id="app-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/greenmart-core.js"></script>
    <script src="js/redeem.js"></script>
</body>

</html>
